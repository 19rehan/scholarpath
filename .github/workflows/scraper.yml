name: AdmitGoal Daily Scrapers

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'   # Official: 1am, 7am, 1pm, 7pm UTC
    - cron: '0 4,10,16,22 * * *'  # Aggregator: 4am, 10am, 4pm, 10pm UTC
  workflow_dispatch:

jobs:
  official-scraper:
    name: Official Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests beautifulsoup4 lxml psycopg2-binary
      - name: Scrape official sources
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scraper_official.py
      - name: Clean bad data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python clean_data.py

  aggregator-scraper:
    name: Aggregator Sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests beautifulsoup4 lxml psycopg2-binary
      - name: Scrape aggregator sources
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scraper_aggregator.py
      - name: Clean bad data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python clean_data.py