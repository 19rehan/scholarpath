name: AdmitGoal Scrapers

on:
  workflow_dispatch:

jobs:
  official-scraper:
    name: Official Sources Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests beautifulsoup4 lxml psycopg2-binary
      - name: Run official scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scraper_official.py

  aggregator-scraper:
    name: Aggregator Sources Scraper
    runs-on: ubuntu-latest
    needs: official-scraper
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests beautifulsoup4 lxml psycopg2-binary
      - name: Run aggregator scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scraper_aggregator.py

  clean-data:
    name: Clean Bad Data
    runs-on: ubuntu-latest
    needs: aggregator-scraper
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install psycopg2-binary
      - name: Clean outdated and bad data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python clean_data.py