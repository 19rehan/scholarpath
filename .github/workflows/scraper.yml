name: AdmitGoal Quality Scraper

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  quality-scraper:
    name: Quality Scholarship Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml psycopg2-binary
      - name: Run quality scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python quality_scraper.py
      - name: Clean bad data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python clean_data.py