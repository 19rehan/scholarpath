name: AdmitGoal Scholarship Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml psycopg2-binary
      - name: Fix outdated and update deadlines
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python fix_data.py
      - name: Scrape fresh scholarships
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python master_scraper_v2.py