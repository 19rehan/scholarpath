name: Daily Scholarship Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: pip install requests beautifulsoup4 lxml psycopg2-binary
      - name: Scrape
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python quick_scraper.py